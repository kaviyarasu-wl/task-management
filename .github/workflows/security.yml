name: Security Audit
on:
  schedule:
    - cron: '0 6 * * 1' # Weekly Monday 6 AM UTC
  pull_request:
    paths:
      - '**/package-lock.json'

jobs:
  audit:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Run npm audit
        run: npm audit --audit-level=high
        working-directory: ${{ matrix.package }}
